<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="src/assets/profile.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rathana.Dev</title>
    <script>
      // Apply theme immediately before any rendering to prevent flash
      (function() {
        var savedTheme = localStorage.getItem('theme');
        var theme = savedTheme || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <style>
      /* Initial theme to prevent flicker */
      html[data-theme="dark"] {
        --primary-color: #0f172a;
        --primary-dark: #1e293b;
        --text-color: #cbd5e1;
        --text-dark: #cbd5e1;
        --accent-color: #14b8a6;
        --accent-light: #5eead4;
        --bg-hover: #1e293b;
        --border-color: rgba(255, 255, 255, 0.1);
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        --card-bg: linear-gradient(180deg, rgba(15, 23, 42, 0.92) 0%, rgba(30, 41, 59, 0.95) 100%);
        --card-shadow: 0 14px 32px rgba(5, 10, 20, 0.3);
        --badge-bg: #1e293b;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-hover: rgba(255, 255, 255, 0.08);
        --input-bg: rgba(255, 255, 255, 0.05);
        --footer-bg: linear-gradient(135deg, #050a15 0%, #0a1020 100%);
      }
      
      html[data-theme="light"] {
        --primary-color: #f8fafc;
        --primary-dark: #ffffff;
        --text-color: #0f172a;
        --text-dark: #475569;
        --accent-color: #0d9488;
        --accent-light: #14b8a6;
        --bg-hover: #f1f5f9;
        --border-color: rgba(0, 0, 0, 0.08);
        --shadow: 0 4px 12px -1px rgba(0, 0, 0, 0.06);
        --card-bg: #ffffff;
        --card-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        --badge-bg: #e2e8f0;
        --glass-bg: rgba(255, 255, 255, 0.8);
        --glass-hover: rgba(255, 255, 255, 0.95);
        --input-bg: #f8fafc;
        --footer-bg: linear-gradient(135deg, #f1f5f9 0%, #ffffff 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
